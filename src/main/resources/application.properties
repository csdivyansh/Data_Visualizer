spring.application.name=Data Visualizer

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MongoDB Configuration (optional - configure when MongoDB is set up)
# spring.data.mongodb.uri=mongodb://localhost:27017/data-visualizer
# spring.data.mongodb.database=data-visualizer

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.example.data_visualizer=DEBUG
